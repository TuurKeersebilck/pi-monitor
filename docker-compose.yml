services:
  dashboard:
    build: .
    container_name: dashboard
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.5"

networks:
  proxy:
    external: true
